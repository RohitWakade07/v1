
<div id="erd1"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({ startOnLoad:false, theme:'base', fontFamily:'"Anthropic Sans",sans-serif', themeVariables:{ darkMode:dark, fontSize:'13px', fontFamily:'"Anthropic Sans",sans-serif', lineColor:dark?'#9c9a92':'#73726c', textColor:dark?'#c2c0b6':'#3d3d3a' } });
const { svg } = await mermaid.render('e1', `erDiagram
  weekly_tasks ||--o{ quizzes : "has one"
  quizzes ||--o{ quiz_questions : contains
  quiz_questions ||--o{ quiz_options : "has options"
  quizzes ||--o{ quiz_attempts : "attempted by"
  quiz_attempts ||--o{ quiz_answers : contains
  quiz_questions ||--o{ quiz_answers : "answered via"

  weekly_tasks {
    uuid id PK
    string title
    timestamp deadline
    bool is_published
  }
  quizzes {
    uuid id PK
    uuid weekly_task_id FK
    string title
    int marks_per_question
    bool is_active
    timestamp created_at
    timestamp updated_at
  }
  quiz_questions {
    uuid id PK
    uuid quiz_id FK
    text question_text
    enum type "single or multiple"
    int marks
    int order_index
    timestamp created_at
  }
  quiz_options {
    uuid id PK
    uuid question_id FK
    text option_text
    bool is_correct
    int order_index
  }
  quiz_attempts {
    uuid id PK
    uuid quiz_id FK
    uuid student_id FK
    int total_score
    int max_score
    timestamp started_at
    timestamp submitted_at
  }
  quiz_answers {
    uuid id PK
    uuid attempt_id FK
    uuid question_id FK
    bool is_correct
    int marks_awarded
  }
  quiz_answer_options {
    uuid id PK
    uuid answer_id FK
    uuid option_id FK
  }
`);
document.getElementById('erd1').innerHTML = svg;
document.querySelectorAll('#erd1 .node').forEach(n=>{const p=n.querySelector('path[d]');if(!p)return;const d=p.getAttribute('d'),nums=d.match(/-?[\d.]+/g)?.map(Number);if(!nums||nums.length<8)return;const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]],x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y,r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');for(const a of['fill','stroke','stroke-width','class','style'])if(p.hasAttribute(a))r.setAttribute(a,p.getAttribute(a));p.replaceWith(r);});
document.querySelectorAll('#erd1 .row-rect-odd path,#erd1 .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
</div>
