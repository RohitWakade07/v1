services:
  mysql:
    image: mysql:8.0
    container_name: autograder_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: autograder_db
      MYSQL_USER: grader_user
      MYSQL_PASSWORD: grader_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugrader_user", "-pgrader_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: autograder_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      network: host
    container_name: autograder_web
    restart: unless-stopped
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8080:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  worker:
    build:
      context: .
      network: host
    container_name: autograder_worker
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A app.tasks.grader.celery_app worker --loglevel=info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/autograder_jobs:/tmp/autograder_jobs

volumes:
  mysql_data:
