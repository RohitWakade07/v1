services:

  postgres:
    image: postgres:16-alpine
    container_name: grading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grading_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: grading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grading_user -d grading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grading_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: grading_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile.api
    container_name: grading_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: grading_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount the host Docker socket so the worker can spin up sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared jobs directory — grader containers access submission files via this volume
      - grader_jobs:/tmp/autograder_jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grader_jobs:
