services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: grading_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount the Docker socket so the worker can spin up sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared jobs directory — grader containers access submission files via this volume
      - grader_jobs:/tmp/autograder_jobs

volumes:
  grader_jobs:
    name: grader_jobs
